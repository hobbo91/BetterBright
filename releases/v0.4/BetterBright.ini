# BetterBright settings file
#
# List the brightness values you want, one per line, 0-100.
# Press the PSP's Display (screen) button or chosen button combo to step through them.
#
# Notes 
#.  
#   * These values may change depending on PSP model and revision.
#   * 0 means the backlight is off, 100 is the displays max brightness setting.
#.  * Tested with PSP-3000VB 09g.

00
20
40
50
60
80
90
100

# --- options ----------------------------------------------------------------
# combo_mode - choose ONE optional control scheme (or 0 for none). Pressing the
# Display/brightness button on its own ALWAYS cycles, whatever this is set to.
#
#   0 = off (Display button cycling only)
#   1 = trigger + Display button:   R + Display = brighter, L + Display = dimmer
#   2 = both triggers + D-Pad:      L+R+Up = brighter,  L+R+Down = dimmer
#
# Both combo schemes stop at the dimmest/brightest end of the list (no wrap-around).
combo_mode=1

# hold_brightness - keep the screen at your chosen brightness while idle by
# stopping the ~1-minute auto-dim feature before it starts. 
# This is useful when setting values above the factory battery/plugged-in defaults.
# Does not affect auto-sleep, the device will still sleep as normal. OFF by default (0)
#
#        NOTE: The screen will not dim or power off when idle! 
#        **USE AT YOUR OWN RISK** as this could cause damage to your display.
hold_brightness=0
